<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TikTok无水印下载</title>

<style>

/* 作用域隔离 */
#tt-downloader{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
    background:#f5f5f5;
    padding:30px 15px;
}

/* 主容器 */
#tt-downloader .tt-container{
    background:white;
    max-width:480px;
    margin:auto;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.08);
    text-align:center;
}

/* 标题 */
#tt-downloader h2{
    margin-bottom:10px;
}

/* 输入框 */
#tt-downloader input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ddd;
    border-radius:6px;
    font-size:16px;
    box-sizing:border-box;
}

/* 按钮 */
#tt-downloader button{
    margin-top:15px;
    padding:12px;
    width:100%;
    border:none;
    background:#ff2c55;
    color:white;
    font-size:16px;
    border-radius:6px;
    cursor:pointer;
}

/* 视频 */
#tt-downloader video{
    margin-top:20px;
    width:100%;
    border-radius:6px;
}

/* 下载按钮 */
#tt-downloader .download-btn{
    display:block;
    margin-top:15px;
    text-decoration:none;
}

#tt-downloader .download-btn button{
    background:#111;
}

#tt-downloader .tips{
    font-size:13px;
    color:#666;
    margin-top:10px;
}

</style>
</head>

<body>

<div id="tt-downloader">

<div class="tt-container">

<h2>TikTok 无水印下载</h2>

<input id="tt-url" placeholder="粘贴 TikTok 视频链接">

<button onclick="ttDownload()">解析视频</button>

<div class="tips">
支持 TikTok 视频无水印下载
</div>

<div id="tt-result"></div>

</div>

</div>

<script>

async function ttDownload(){

let url = document.getElementById("tt-url").value

if(!url){
alert("请输入 TikTok 视频链接")
return
}

let api = "https://www.tikwm.com/api/?url=" + encodeURIComponent(url)

let res = await fetch(api)

let data = await res.json()

if(data.data){

let video = data.data.play

document.getElementById("tt-result").innerHTML = `
<video controls src="${video}"></video>
<a class="download-btn" href="${video}" download>
<button>下载视频</button>
</a>
`

}else{

document.getElementById("tt-result").innerHTML="解析失败，请换一个链接"

}

}

</script>

</body>
</html>
