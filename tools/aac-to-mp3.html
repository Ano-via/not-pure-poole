<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AAC 批量转 MP3</title>
    
    <style>
        .aac-converter-app {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .aac-converter-app h1 { margin-top: 0; color: #1a1a1a; font-size: 24px; }
        .aac-converter-app .description { color: #666; margin-bottom: 30px; font-size: 14px; }

        .aac-converter-app .upload-area {
            border: 2px dashed #ddd;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 20px;
        }

        .aac-converter-app button {
            width: 100%;
            background: #007bff;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .aac-converter-app button:hover { background: #0056b3; }
        .aac-converter-app button:disabled { background: #ccc; cursor: not-allowed; }

        .aac-converter-app .progress-bar {
            margin: 20px 0;
            font-weight: bold;
            color: #007bff;
            font-size: 14px;
        }

        .aac-converter-app #log {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 12px;
            color: #555;
            border: 1px solid #eee;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="aac-converter-app">
    <h1>AAC 批量转 MP3</h1>
    <p class="description">选择 AAC 文件，我们将为您将其转换为高音质 MP3 并打包下载。</p>

    <div class="upload-area">
        <input type="file" id="files" multiple accept=".aac"/>
    </div>

    <button id="startBtn" onclick="startConvert()">
        开始转换并下载 ZIP
    </button>

    <div class="progress-bar" id="progress">等待操作...</div>

    <div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
const logBox = document.getElementById("log");

function log(msg, isError = false){

    const time = new Date().toLocaleTimeString();

    logBox.innerHTML +=
        `[${time}] ${isError ? '❌ ' : ''}${msg}\n`;

    logBox.scrollTop = logBox.scrollHeight;
}

window.onerror = function(msg, src, line, col, err){

    log(
        `${msg}\n${src}:${line}:${col}\n${err?.stack || ''}`,
        true
    );
};

window.onunhandledrejection = function(e){

    log(
        `Promise Error:\n${e.reason?.stack || e.reason}`,
        true
    );
};

const { createFFmpeg, fetchFile } = FFmpeg;

const ffmpeg = createFFmpeg({
    log: true
});

async function startConvert(){

    try{

        const files =
            document.getElementById("files").files;

        if(!files.length){

            alert("请选择 AAC 文件");

            return;
        }

        const progress =
            document.getElementById("progress");

        progress.innerHTML = "加载 FFmpeg...";

        log("开始加载 FFmpeg");

        if(!ffmpeg.isLoaded()){

            try{

                await ffmpeg.load();

                log("FFmpeg 加载成功");

            }catch(err){

                log(
                    "FFmpeg 加载失败:\n" +
                    err.stack,
                    true
                );

                return;
            }
        }

        const zip = new JSZip();

        let index = 0;

        for(const file of files){

            try{

                index++;

                progress.innerHTML =
                    `转换中 ${index}/${files.length}`;

                log(`开始处理: ${file.name}`);

                const inputName = file.name;

                const outputName =
                    file.name.replace(/\.aac$/i, ".mp3");

                ffmpeg.FS(
                    'writeFile',
                    inputName,
                    await fetchFile(file)
                );

                log(`已写入: ${inputName}`);

                await ffmpeg.run(
                    '-i',
                    inputName,
                    '-codec:a',
                    'libmp3lame',
                    '-q:a',
                    '2',
                    outputName
                );

                log(`转换完成: ${outputName}`);

                const data =
                    ffmpeg.FS(
                        'readFile',
                        outputName
                    );

                zip.file(outputName, data);

                ffmpeg.FS('unlink', inputName);
                ffmpeg.FS('unlink', outputName);

            }catch(err){

                log(
                    `文件失败: ${file.name}\n` +
                    err.stack,
                    true
                );
            }
        }

        progress.innerHTML = "打包 ZIP...";

        log("开始生成 ZIP");

        const blob =
            await zip.generateAsync({
                type:'blob'
            });

        const url =
            URL.createObjectURL(blob);

        const a =
            document.createElement('a');

        a.href = url;

        a.download = 'mp3_files.zip';

        a.click();

        progress.innerHTML = "完成";

        log("全部完成");

    }catch(err){

        log(
            "全局错误:\n" +
            err.stack,
            true
        );
    }
}
</script>
</body>
</html>
