<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>音频转MP3工具</title>

<style>
/* ===== 完全隔离 ===== */
.aacx-app{
    font-family:'Segoe UI',system-ui,sans-serif;
    max-width:720px;
    margin:40px auto;
    padding:35px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.aacx-app *{box-sizing:border-box;}

.aacx-title{
    font-size:26px;
    margin:0 0 10px;
}

.aacx-desc{
    font-size:14px;
    color:#666;
    margin-bottom:20px;
}

.aacx-upload{
    border:2px dashed #ccc;
    padding:40px 20px;
    text-align:center;
    border-radius:16px;
    background:#fafafa;
    cursor:pointer;
    transition:.2s;
}

.aacx-upload.aacx-dragover{
    border-color:#007bff;
    background:#eef5ff;
    transform:scale(1.01);
}

#aacx-files{display:none;}

.aacx-filelist{
    margin-top:15px;
    font-size:13px;
    color:#444;
    line-height:1.8;
}

.aacx-btn{
    width:100%;
    margin-top:12px;
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    background:#007bff;
    color:#fff;
    transition:.2s;
}

.aacx-btn:hover{background:#0056b3;}

.aacx-btn.gray{background:#6c757d;}

.aacx-progress{
    margin-top:15px;
    font-size:14px;
    color:#007bff;
    font-weight:bold;
}

.aacx-log{
    margin-top:20px;
    height:180px;
    overflow:auto;
    background:#f8f9fa;
    border:1px solid #eee;
    padding:12px;
    font-size:12px;
    font-family:monospace;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="aacx-app">

    <h1 class="aacx-title">音频批量转 MP3</h1>
    <div class="aacx-desc">拖拽 / 点击上传 / 单文件直下 / 多文件ZIP</div>

    <div class="aacx-upload" id="dropArea">
        <b>拖拽文件到这里</b>
        <div style="margin-top:8px;color:#666;">或点击选择文件</div>

        <input id="aacx-files" type="file" multiple accept=".aac,.m4a,.wav,audio/*"/>
    </div>

    <div class="aacx-filelist" id="fileList">暂无文件</div>

    <button class="aacx-btn" id="startBtn">开始转换</button>

    <button class="aacx-btn gray" id="clearBtn">清空文件</button>

    <div class="aacx-progress" id="progress">等待操作...</div>

    <div class="aacx-log" id="log"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

let filesList = [];

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("aacx-files");
const fileList = document.getElementById("fileList");
const startBtn = document.getElementById("startBtn");
const clearBtn = document.getElementById("clearBtn");
const progress = document.getElementById("progress");
const logBox = document.getElementById("log");

/* ===== log ===== */
function log(msg, err=false){
    const t = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${t}] ${err?"❌":"✔"} ${msg}\n`;
    logBox.scrollTop = logBox.scrollHeight;
}

/* ===== 文件列表（关键：省略显示） ===== */
function render(){

    if(!filesList.length){
        fileList.innerHTML = "暂无文件";
        return;
    }

    if(filesList.length === 1){
        fileList.innerHTML = "• " + filesList[0].name;
        return;
    }

    fileList.innerHTML =
        `• ${filesList[0].name} 等共 ${filesList.length} 个文件`;
}

/* ===== 添加文件 ===== */
function add(files){

    const arr = [...files].filter(f=>/\.(aac|m4a|wav)$/i.test(f.name));

    filesList.push(...arr);

    filesList = filesList.filter((f,i,self)=>
        i===self.findIndex(x=>x.name===f.name&&x.size===f.size)
    );

    render();
    log(`添加 ${arr.length} 个文件`);
}

/* ===== 上传 ===== */
dropArea.onclick = ()=>fileInput.click();
fileInput.onchange = e=>add(e.target.files);

/* ===== 拖拽 ===== */
dropArea.ondragover = e=>{
    e.preventDefault();
    dropArea.classList.add("aacx-dragover");
};

dropArea.ondragleave = ()=>{
    dropArea.classList.remove("aacx-dragover");
};

dropArea.ondrop = e=>{
    e.preventDefault();
    dropArea.classList.remove("aacx-dragover");
    add(e.dataTransfer.files);
};

/* ===== 清空 ===== */
clearBtn.onclick = ()=>{
    filesList = [];
    render();
    progress.innerText = "等待操作...";
    log("已清空文件");
};

/* ===== 转换 ===== */
async function toMp3(file){

    const ctx = new AudioContext();
    const buf = await ctx.decodeAudioData(await file.arrayBuffer());
    const data = buf.getChannelData(0);

    const enc = new lamejs.Mp3Encoder(1, buf.sampleRate, 128);

    let out = [];

    for(let i=0;i<data.length;i+=1152){

        const chunk = data.subarray(i,i+1152);
        const int16 = new Int16Array(chunk.length);

        for(let j=0;j<chunk.length;j++){
            let s=Math.max(-1,Math.min(1,chunk[j]));
            int16[j]=s<0?s*0x8000:s*0x7fff;
        }

        const buf2 = enc.encodeBuffer(int16);
        if(buf2.length) out.push(buf2);
    }

    const end = enc.flush();
    if(end.length) out.push(end);

    return new Blob(out,{type:"audio/mp3"});
}

/* ===== 主流程（核心：单文件不打包） ===== */
startBtn.onclick = async ()=>{

    if(!filesList.length){
        alert("请选择文件");
        return;
    }

    startBtn.disabled = true;

    let ok=0,fail=0;

    /* ===== 单文件 ===== */
    if(filesList.length === 1){

        const f = filesList[0];

        progress.innerText="处理中 1/1";

        try{

            const mp3 = await toMp3(f);

            const name = f.name.replace(/\.[^.]+$/,".mp3");

            const url = URL.createObjectURL(mp3);

            const a=document.createElement("a");
            a.href=url;
            a.download=name;
            a.click();

            URL.revokeObjectURL(url);

            ok=1;

            log("完成 "+name);

        }catch(e){
            fail=1;
            log("失败 "+f.name,true);
        }
    }

    /* ===== 多文件 ===== */
    else{

        const zip = new JSZip();

        for(let i=0;i<filesList.length;i++){

            const f = filesList[i];

            progress.innerText=`处理中 ${i+1}/${filesList.length}`;

            try{

                const mp3 = await toMp3(f);

                const name = f.name.replace(/\.[^.]+$/,".mp3");

                zip.file(name,mp3);

                ok++;

                log("完成 "+name);

            }catch(e){
                fail++;
                log("失败 "+f.name,true);
            }
        }

        progress.innerText="生成ZIP...";

        const blob = await zip.generateAsync({type:"blob"});

        const url = URL.createObjectURL(blob);

        const a=document.createElement("a");
        a.href=url;
        a.download="mp3.zip";
        a.click();

        URL.revokeObjectURL(url);
    }

    /* ===== 完成UI ===== */
    progress.innerText=`完成 OK:${ok} FAIL:${fail}`;

    log(`全部完成 OK:${ok} FAIL:${fail}`);

    startBtn.style.background="#28a745";
    startBtn.innerText="√ 已完成";

    setTimeout(()=>{
        startBtn.style.background="#007bff";
        startBtn.innerText="开始转换";
    },3000);

    startBtn.disabled=false;
};

</script>

</body>
</html>
