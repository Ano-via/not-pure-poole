<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>音频转MP3</title>

<style>
.aacx-app{
    font-family:'Segoe UI',system-ui;
    max-width:720px;
    margin:40px auto;
    padding:35px;
    background:#fff;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.aacx-upload{
    border:2px dashed #ccc;
    padding:35px;
    text-align:center;
    border-radius:16px;
    background:#fafafa;
    cursor:pointer;
}

#aacx-files{display:none;}

.aacx-filelist{
    margin-top:12px;
    font-size:13px;
    color:#444;
}

.aacx-btn{
    width:100%;
    margin-top:10px;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#007bff;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

.aacx-btn.gray{background:#666;}

.aacx-progress-text{
    margin-top:15px;
    font-weight:bold;
    color:#007bff;
}

/* ===== 进度条 ===== */
.aacx-bar-bg{
    width:100%;
    height:14px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.aacx-bar{
    height:100%;
    width:0%;
    background:#007bff;
    transition:width .2s;
}

.aacx-log{
    margin-top:20px;
    height:160px;
    overflow:auto;
    font-size:12px;
    font-family:monospace;
    background:#f8f9fa;
    padding:10px;
}
</style>
</head>

<body>

<div class="aacx-app">

<h2>音频转 MP3</h2>

<div class="aacx-upload" id="dropArea">
    点击或拖拽上传，支持逐个添加
    <input type="file" id="aacx-files" multiple accept=".aac,.m4a,.wav,audio/*">
</div>

<div class="aacx-filelist" id="fileList">暂无文件</div>

<button class="aacx-btn" id="startBtn">开始转换</button>
<button class="aacx-btn gray" id="clearBtn">清空文件</button>

<div class="aacx-progress-text" id="progressText">等待操作...</div>

<div class="aacx-bar-bg">
    <div class="aacx-bar" id="bar"></div>
</div>

<div class="aacx-log" id="log"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>

let filesList=[];

const dropArea=document.getElementById("dropArea");
const fileInput=document.getElementById("aacx-files");
const fileList=document.getElementById("fileList");
const logBox=document.getElementById("log");
const progressText=document.getElementById("progressText");
const bar=document.getElementById("bar");
const startBtn=document.getElementById("startBtn");
const clearBtn=document.getElementById("clearBtn");

/* ===== log ===== */
function log(msg, isError=false){

    const div = document.createElement("div");

    const time = new Date().toLocaleTimeString();

    div.textContent =
        `[${time}] ${isError ? "❌" : "✔"} ${msg}`;

    div.style.padding = "2px 0";

    if(isError){
        div.style.color = "#d9534f";
    }

    logBox.appendChild(div);

    logBox.scrollTop = logBox.scrollHeight;
}

/* ===== UI ===== */
function render(){
    if(!filesList.length){
        fileList.innerHTML="暂无文件";
        return;
    }
    if(filesList.length===1){
        fileList.innerHTML="• "+filesList[0].name;
        return;
    }
    fileList.innerHTML=
        `• ${filesList[0].name} 等共 ${filesList.length} 个文件`;
}

/* ===== 添加 ===== */
function add(files){
    const arr=[...files].filter(f=>/\.(aac|m4a|wav)$/i.test(f.name));
    filesList.push(...arr);
    render();
    log("添加 "+arr.length+" 文件");
}

/* ===== 拖拽 ===== */
dropArea.onclick=()=>fileInput.click();
fileInput.onchange=e=>add(e.target.files);

dropArea.ondragover=e=>{
    e.preventDefault();
    dropArea.style.background="#eef5ff";
};

dropArea.ondragleave=()=>{
    dropArea.style.background="#fafafa";
};

dropArea.ondrop=e=>{
    e.preventDefault();
    add(e.dataTransfer.files);
};

/* ===== 清空 ===== */
clearBtn.onclick=()=>{
    filesList=[];
    render();
    setProgress(0);
    log("清空文件");
};

/* ===== 进度条 ===== */
function setProgress(p){
    bar.style.width=p+"%";
    progressText.innerText=`进度 ${p.toFixed(0)}%`;
}

/* ===== 转换 ===== */
async function toMp3(file){

    const ctx=new AudioContext();
    const buf=await ctx.decodeAudioData(await file.arrayBuffer());
    const data=buf.getChannelData(0);

    const enc=new lamejs.Mp3Encoder(1,buf.sampleRate,128);

    let out=[];

    for(let i=0;i<data.length;i+=1152){

        const chunk=data.subarray(i,i+1152);
        const int16=new Int16Array(chunk.length);

        for(let j=0;j<chunk.length;j++){
            let s=Math.max(-1,Math.min(1,chunk[j]));
            int16[j]=s<0?s*0x8000:s*0x7fff;
        }

        const buf2=enc.encodeBuffer(int16);
        if(buf2.length) out.push(buf2);
    }

    const end=enc.flush();
    if(end.length) out.push(end);

    return new Blob(out,{type:"audio/mp3"});
}

/* ===== 主流程（带进度） ===== */
startBtn.onclick=async()=>{

    if(!filesList.length) return;

    startBtn.disabled=true;

    let ok=0,fail=0;

    const total=filesList.length;

    /* ===== 单文件 ===== */
    if(total===1){

        setProgress(10);

        try{

            const mp3=await toMp3(filesList[0]);

            setProgress(80);

            const name=filesList[0].name.replace(/\.[^.]+$/,".mp3");

            const url=URL.createObjectURL(mp3);

            const a=document.createElement("a");
            a.href=url;
            a.download=name;
            a.click();

            URL.revokeObjectURL(url);

            ok=1;

        }catch(e){
            fail=1;
        }

        setProgress(100);
    }

    /* ===== 多文件 ===== */
    else{

        const zip=new JSZip();

        for(let i=0;i<total;i++){

            const f=filesList[i];

            const p=Math.round((i/total)*100);

            setProgress(p);

            try{

                const mp3=await toMp3(f);

                const name=f.name.replace(/\.[^.]+$/,".mp3");

                zip.file(name,mp3);

                ok++;

            }catch(e){
                fail++;
            }
        }

        setProgress(90);

        const blob=await zip.generateAsync({type:"blob"});

        const url=URL.createObjectURL(blob);

        const a=document.createElement("a");
        a.href=url;
        a.download="mp3.zip";
        a.click();

        URL.revokeObjectURL(url);

        setProgress(100);
    }

    log(`完成。 ${ok} 个成功； ${fail} 个失败`);

    startBtn.style.background="#28a745";
    startBtn.innerText="√ 已完成";

    setTimeout(()=>{
        startBtn.style.background="#007bff";
        startBtn.innerText="开始转换";
    },3000);

    startBtn.disabled=false;
};

</script>

</body>
</html>
