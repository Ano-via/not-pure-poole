<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>图片水印打码工具</title>
    <link rel="icon" href="favicon.png" sizes="16x16" type="image/png">
    <style>
        #watermark-container {
            max-width: 500px;
            margin: 30px auto 30px 30px;
            font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Hiragino Sans GB", "WenQuanYi Micro Hei", sans-serif;
        }

        #watermark-container h1 {
            margin: 0;
        }

        #watermark-container p,
        #watermark-container article {
            margin: 0 0 20px 0;
        }

        #watermark-container article {
            font-size: 14px;
            color: #777;
        }

        #watermark-container label {
            color: blue;
            font-size: 17px;
        }

        #watermark-container p label {
            color: black;
            display: inline-block;
            margin-right: 5px;
            font-size: 15px;
        }

        #watermark-container p {
            font-size: 15px;
            line-height: 30px;
        }

        #watermark-container p>* {
            vertical-align: middle;
        }

        #watermark-container input#text-input {
            width: 100%;
            box-sizing: border-box;
            font-size: 16px;
            margin-bottom: 10px;
        }

        #watermark-container input[type=range] {
            width: 200px;
            height: 18px;
        }

        #watermark-container canvas {
            box-sizing: border-box;
            width: 100%;
            border: 1px dashed #AAA;
            cursor: pointer;
        }

        /* 新增样式 */
        #watermark-container .watermark-mode-controls {
            margin-bottom: 15px;
        }

        #watermark-container .watermark-mode-controls button {
            margin-right: 10px;
            padding: 5px 15px;
            font-size: 14px;
            cursor: pointer;
        }

        #watermark-container .watermark-mode-controls button.active {
            background-color: blue;
            color: white;
            border-color: blue;
        }
    </style>
</head>

<body>
    <div id="watermark-container">
        <article>安全地为你的图片加水印，无任何网络请求，特别适合各种敏感证件（身份证，驾照，护照等）。</article>

        <label for="image-input">第一步：先选择一张本地图片</label>
        <p><input type="file" id="image-input" accept="image/jpeg,image/png,image/gif" autocomplete="off"></p>


        <label for="text-input">第二步：输入需要打水印的文字</label>
        <p>
            <input type="text" id="text-input" placeholder="请输入文字" autocomplete="off" maxlength="30">
        </p>

        <!-- 新增水印模式选择 -->
        <div class="watermark-mode-controls">
            <button id="mode-phrase" class="active">短语模式</button>
            <button id="mode-tile">平铺模式</button>
        </div>

        <p>
            <label for="color-input">颜色</label>
            <input type="color" id="color-input" pattern="#[0-9A-Fa-f]{6}" autocomplete="off" value="#FFFFFF"><br>

            <label for="alpha-input">透明度</label>
            <input type="range" id="alpha-input" min="0" max="1" step="0.05" autocomplete="off" value="0.15"><br>

            <label for="rotation-input">旋转角度</label>
            <input type="range" id="rotation-input" min="-180" max="180" step="1" autocomplete="off" value="-45"><br>

            <label for="space-input" class="tile-only">间隔</label>
            <input type="range" id="space-input" min="1" max="8" step="0.2" autocomplete="off" value="4" class="tile-only"><br class="tile-only">

            <label for="size-input">字号</label>
            <input type="range" id="size-input" min="0.5" max="10" step="0.05" autocomplete="off" value="1">
        </p>

        <label for="text-input">第三步：点击图片下载</label>
        <p>
            <label for="auto-refresh-checkbox">实时刷新</label>
            <input type="checkbox" id="auto-refresh-checkbox" autocomplete="off" checked>
            <button id="refresh-button" disabled>刷新</button>
        </p>
        <p id="graph-output"></p>
    </div>

    <script>
        (function() {
            var $, autoRefreshCheckbox, canvas, dataURItoBlob, drawText, file, generateFileName, graphOutput, imageInput, input, inputItems, makeStyle, readFile, redraw, refreshButton, textCtx;
            var watermarkMode = 'phrase'; // 默认短语模式

            $ = function(sel) {
                return document.querySelector(sel);
            };

            inputItems = ['text-input', 'color-input', 'alpha-input', 'rotation-input', 'space-input', 'size-input'];

            input = {};

            imageInput = $('#image-input');

            graphOutput = $('#graph-output');

            refreshButton = $('#refresh-button');

            autoRefreshCheckbox = $('#auto-refresh-checkbox');

            file = null;

            canvas = null;

            textCtx = null;

            redraw = null;

            // 水印模式按钮
            var modePhraseButton = $('#mode-phrase');
            var modeTileButton = $('#mode-tile');
            var tileOnlyElements = document.querySelectorAll('.tile-only');

            function updateWatermarkMode(mode) {
                watermarkMode = mode;
                if (watermarkMode === 'phrase') {
                    modePhraseButton.classList.add('active');
                    modeTileButton.classList.remove('active');
                    tileOnlyElements.forEach(el => el.style.display = 'none');
                } else {
                    modeTileButton.classList.add('active');
                    modePhraseButton.classList.remove('active');
                    tileOnlyElements.forEach(el => el.style.display = 'inline-block');
                }
                drawText(); // 切换模式后立即刷新水印
            }

            modePhraseButton.addEventListener('click', function() {
                updateWatermarkMode('phrase');
            });

            modeTileButton.addEventListener('click', function() {
                updateWatermarkMode('tile');
            });

            dataURItoBlob = function(dataURI) {
                var arr, binStr, i, k, len, ref;
                binStr = atob((dataURI.split(','))[1]);
                len = binStr.length;
                arr = new Uint8Array(len);
                for (i = k = 0, ref = len - 1; (0 <= ref ? k <= ref : k >= ref); i = 0 <= ref ? ++k : --k) {
                    arr[i] = binStr.charCodeAt(i);
                }
                return new Blob([arr], {
                    type: 'image/png'
                });
            };

            generateFileName = function() {
                var d, pad;
                pad = function(n) {
                    if (n < 10) {
                        return '0' + n;
                    } else {
                        return n;
                    }
                };
                d = new Date();
                return '' + d.getFullYear() + '-' + (pad(d.getMonth() + 1)) + '-' + (pad(d.getDate())) + ' ' + (pad(d.getHours())) + (pad(d.getMinutes())) + (pad(d.getSeconds())) + '.png';
            };

            readFile = function() {
                var fileReader;
                if (file == null) {
                    return;
                }
                fileReader = new FileReader();
                fileReader.onload = function() {
                    var img;
                    img = new Image();
                    img.onload = function() {
                        var ctx;
                        canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        textCtx = null;
                        ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        redraw = function() {
                            // 修正清除和重绘逻辑，确保旋转角度在绘制水印前被正确设置
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            ctx.drawImage(img, 0, 0);
                        };
                        drawText();
                        graphOutput.innerHTML = '';
                        graphOutput.appendChild(canvas);
                        return canvas.addEventListener('click', function() {
                            var blob, imageData, link;
                            link = document.createElement('a');
                            link.download = generateFileName();
                            imageData = canvas.toDataURL('image/png');
                            blob = dataURItoBlob(imageData);
                            link.href = URL.createObjectURL(blob);
                            graphOutput.appendChild(link);
                            return setTimeout(function() {
                                link.click();
                                return graphOutput.removeChild(link);
                            }, 100);
                        });
                    };
                    return img.src = fileReader.result;
                };
                return fileReader.readAsDataURL(file);
            };

            makeStyle = function() {
                var match;
                match = input['color-input'].value.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
                return 'rgba(' + (parseInt(match[1], 16)) + ',' + (parseInt(match[2], 16)) + ',' + (parseInt(match[3], 16)) + ',' + input['alpha-input'].value + ')';
            };

            drawText = function() {
                if (canvas == null) {
                    return;
                }

                if (textCtx == null) {
                    textCtx = canvas.getContext('2d');
                }

                // 每次绘制前重置画布，并绘制原始图片
                redraw();

                textCtx.fillStyle = makeStyle();
                textCtx.font = 'bold ' + (input['size-input'].value * Math.max(15, (Math.min(canvas.width, canvas.height)) / 25)) + 'px -apple-system,"Helvetica Neue",Helvetica,Arial,"PingFang SC","Hiragino Sans GB","WenQuanYi Micro Hei",sans-serif';
                textCtx.textBaseline = 'middle'; // 将文本基线设置为中间

                const textToDraw = input['text-input'].value;
                if (!textToDraw) return; // 如果没有文字，则不绘制

                const rotationDegrees = parseFloat(input['rotation-input'].value);
                const rotationRadians = rotationDegrees * Math.PI / 180;

                if (watermarkMode === 'phrase') {
                    // 短语模式：只在图片中央或指定位置绘制一次
                    textCtx.save(); // 保存当前状态
                    textCtx.translate(canvas.width / 2, canvas.height / 2); // 移动到图片中心
                    textCtx.rotate(rotationRadians); // 应用用户设定的旋转角度
                    textCtx.textAlign = 'center'; // 文本居中对齐
                    textCtx.fillText(textToDraw, 0, 0);
                    textCtx.restore(); // 恢复之前保存的状态
                } else {
                    // 平铺模式
                    textCtx.save(); // 保存当前状态
                    textCtx.translate(canvas.width / 2, canvas.height / 2); // 移动到画布中心
                    textCtx.rotate(rotationRadians); // 应用用户设定的旋转角度

                    const textSize = input['size-input'].value * Math.max(15, (Math.min(canvas.width, canvas.height)) / 25);
                    const width = (textCtx.measureText(textToDraw)).width;
                    const textHeight = textSize; // 近似文本高度
                    const effectiveSpace = input['space-input'].value * textSize;

                    // 计算需要平铺的区域（考虑旋转后可能覆盖的范围）
                    const diagonal = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height);
                    const padding = diagonal * 0.1; // 增加一些内边距以确保覆盖
                    const maxDim = Math.max(canvas.width, canvas.height) + padding;


                    const numCols = Math.ceil(maxDim / (width + effectiveSpace));
                    const numRows = Math.ceil(maxDim / (textHeight + effectiveSpace));


                    // 调整起始绘制位置，使其平铺中心对齐
                    const startX = -((numCols * (width + effectiveSpace)) / 2);
                    const startY = -((numRows * (textHeight + effectiveSpace)) / 2);


                    for (let i = 0; i < numCols * 2; i++) { // 扩大循环范围确保完全覆盖
                        for (let j = 0; j < numRows * 2; j++) { // 扩大循环范围确保完全覆盖
                            textCtx.fillText(textToDraw, startX + i * (width + effectiveSpace), startY + j * (textHeight + effectiveSpace));
                        }
                    }

                    textCtx.restore(); // 恢复之前保存的状态
                }
            };

            imageInput.addEventListener('change', function() {
                var ref;
                file = this.files[0];
                if ((ref = file.type) !== 'image/png' && ref !== 'image/jpeg' && ref !== 'image/gif') {
                    return alert('仅支持 png, jpg, gif 图片格式');
                }
                return readFile();
            });

            inputItems.forEach(function(item) {
                var el;
                el = $('#' + item);
                input[item] = el;
                autoRefreshCheckbox.addEventListener('change', function() {
                    if (this.checked) {
                        return refreshButton.setAttribute('disabled', 'disabled');
                    } else {
                        return refreshButton.removeAttribute('disabled');
                    }
                });
                el.addEventListener('input', function() {
                    if (autoRefreshCheckbox.checked) {
                        return drawText();
                    }
                });
                return refreshButton.addEventListener('click', drawText);
            });

            // 初始化时设置水印模式
            updateWatermarkMode(watermarkMode);

        }).call(this);
    </script>
</body>

</html>
