<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>M4A 批量转 MP3（支持拖拽）</title>

<style>
/* 全部增加 aacx- 前缀，避免 CSS 冲突 */

.aacx-app{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:#fff;
    color:#333;
    max-width:700px;
    margin:40px auto;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,.06);
    box-sizing:border-box;
}

.aacx-app *{
    box-sizing:border-box;
}

.aacx-title{
    margin:0 0 10px;
    font-size:26px;
    color:#111;
}

.aacx-desc{
    color:#666;
    margin-bottom:25px;
    font-size:14px;
}

.aacx-upload{
    border:2px dashed #cfcfcf;
    border-radius:16px;
    padding:40px 20px;
    text-align:center;
    transition:.25s;
    cursor:pointer;
    background:#fafafa;
}

.aacx-upload.aacx-dragover{
    border-color:#007bff;
    background:#eef5ff;
    transform:scale(1.01);
}

.aacx-upload-text{
    font-size:18px;
    font-weight:600;
}

.aacx-upload-tip{
    margin-top:10px;
    color:#666;
    font-size:14px;
}

#aacx-files{
    display:none;
}

.aacx-file-list{
    margin-top:15px;
    font-size:13px;
    color:#444;
    line-height:1.8;
    word-break:break-all;
}

.aacx-btn{
    width:100%;
    margin-top:20px;
    background:#007bff;
    color:#fff;
    border:none;
    padding:15px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    transition:.2s;
}

.aacx-btn:hover{
    background:#0056b3;
}

.aacx-btn:disabled{
    background:#bbb;
    cursor:not-allowed;
}

.aacx-progress{
    margin-top:20px;
    font-weight:bold;
    color:#007bff;
    font-size:14px;
}

.aacx-log{
    margin-top:20px;
    background:#f8f9fa;
    border:1px solid #eee;
    border-radius:12px;
    padding:15px;
    height:180px;
    overflow-y:auto;
    white-space:pre-wrap;
    font-size:12px;
    font-family:Consolas,monospace;
    color:#444;
}
</style>

<div class="aacx-app">

    <h1 class="aacx-title">
        M4A / AAC / WAV 转 MP3
    </h1>

    <div class="aacx-desc">
        支持拖拽多个音频文件，自动转换并打包 ZIP 下载
    </div>

    <div
        class="aacx-upload"
        id="aacx-dropArea"
    >
        <div class="aacx-upload-text">
            拖拽文件到这里
        </div>

        <div class="aacx-upload-tip">
            或点击选择文件
        </div>

        <input
            type="file"
            id="aacx-files"
            multiple
            accept=".aac,.m4a,.wav,audio/aac,audio/mp4,audio/wav"
        />
    </div>

    <div
        class="aacx-file-list"
        id="aacx-fileList"
    >
        暂无文件
    </div>

    <button
        class="aacx-btn"
        id="aacx-startBtn"
    >
        开始转换并下载 ZIP
    </button>

    <div
        class="aacx-progress"
        id="aacx-progress"
    >
        等待操作...
    </div>

    <div
        class="aacx-log"
        id="aacx-log"
    ></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("files");
const fileList = document.getElementById("fileList");
const startBtn = document.getElementById("startBtn");
const progress = document.getElementById("progress");
const logBox = document.getElementById("log");

let selectedFiles = [];

function log(msg, isError = false){

    const time = new Date().toLocaleTimeString();

    logBox.innerHTML +=
        `[${time}] ${isError ? '❌' : '✅'} ${msg}\n`;

    logBox.scrollTop =
        logBox.scrollHeight;
}

function updateFileList(){

    if(!selectedFiles.length){

        fileList.innerHTML = "暂无文件";
        return;
    }

    fileList.innerHTML =
        selectedFiles.map(file =>
            `• ${file.name}`
        ).join("<br>");
}

function addFiles(files){

    const validFiles =
        [...files].filter(file =>
            /\.(aac|m4a|wav)$/i.test(file.name)
        );

    selectedFiles.push(...validFiles);

    // 去重
    selectedFiles =
        selectedFiles.filter(
            (file, index, self) =>
                index === self.findIndex(
                    f =>
                        f.name === file.name &&
                        f.size === file.size
                )
        );

    updateFileList();

    log(`已添加 ${validFiles.length} 个文件`);
}

/* 点击上传 */
dropArea.addEventListener("click", () => {
    fileInput.click();
});

fileInput.addEventListener("change", e => {
    addFiles(e.target.files);
});

/* 拖拽上传 */
dropArea.addEventListener("dragover", e => {

    e.preventDefault();

    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", () => {

    dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", e => {

    e.preventDefault();

    dropArea.classList.remove("dragover");

    addFiles(e.dataTransfer.files);
});

/* 错误处理 */
window.onerror = function(msg){

    log(msg, true);
};

window.onunhandledrejection = function(e){

    log(e.reason || "未知 Promise 错误", true);
};

/* 转 MP3 */
async function audioToMp3(file){

    const audioContext =
        new AudioContext();

    const arrayBuffer =
        await file.arrayBuffer();

    const audioBuffer =
        await audioContext.decodeAudioData(
            arrayBuffer
        );

    const samples =
        audioBuffer.getChannelData(0);

    const mp3encoder =
        new lamejs.Mp3Encoder(
            1,
            audioBuffer.sampleRate,
            128
        );

    const sampleBlockSize = 1152;

    let mp3Data = [];

    for(
        let i = 0;
        i < samples.length;
        i += sampleBlockSize
    ){

        const sampleChunk =
            samples.subarray(
                i,
                i + sampleBlockSize
            );

        const int16 =
            new Int16Array(
                sampleChunk.length
            );

        for(
            let j = 0;
            j < sampleChunk.length;
            j++
        ){

            let s = sampleChunk[j];

            s = Math.max(
                -1,
                Math.min(1, s)
            );

            int16[j] =
                s < 0
                ? s * 0x8000
                : s * 0x7FFF;
        }

        const mp3buf =
            mp3encoder.encodeBuffer(int16);

        if(mp3buf.length > 0){

            mp3Data.push(mp3buf);
        }
    }

    const end =
        mp3encoder.flush();

    if(end.length > 0){

        mp3Data.push(end);
    }

    return new Blob(
        mp3Data,
        {
            type:'audio/mp3'
        }
    );
}

/* 开始转换 */
startBtn.addEventListener(
    "click",
    startConvert
);

async function startConvert(){

    if(!selectedFiles.length){

        alert("请选择或拖拽文件");
        return;
    }

    startBtn.disabled = true;

    const zip = new JSZip();

    let success = 0;
    let failed = 0;

    try{

        log(`开始转换，共 ${selectedFiles.length} 个文件`);

        for(
            let i = 0;
            i < selectedFiles.length;
            i++
        ){

            const file =
                selectedFiles[i];

            progress.innerHTML =
                `处理中 ${i+1}/${selectedFiles.length}`;

            try{

                const mp3Blob =
                    await audioToMp3(file);

                const outputName =
                    file.name.replace(
                        /\.[^/.]+$/,
                        ".mp3"
                    );

                zip.file(
                    outputName,
                    mp3Blob
                );

                success++;

                log(`完成: ${outputName}`);

            }catch(err){

                failed++;

                log(
                    `失败: ${file.name}`,
                    true
                );
            }
        }

        progress.innerHTML =
            "生成 ZIP...";

        const blob =
            await zip.generateAsync({
                type:"blob"
            });

        const url =
            URL.createObjectURL(blob);

        const a =
            document.createElement("a");

        a.href = url;

        a.download =
            "converted_mp3.zip";

        a.click();

        URL.revokeObjectURL(url);

        progress.innerHTML =
            `完成 成功:${success} 失败:${failed}`;

        log(
            `全部完成 成功:${success} 失败:${failed}`
        );

    }catch(err){

        log(
            "转换过程出现错误",
            true
        );

    }finally{

        startBtn.disabled = false;
    }
}
</script>

</body>
</html>
