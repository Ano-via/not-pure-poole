<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* 命名空间：确保所有样式仅在 .password-tool-wrapper 内部生效 */
        .password-tool-wrapper {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            box-sizing: border-box;
            /* 恢复默认的行高和颜色，防止被父级影响 */
            line-height: 1.5;
            color: #333;
        }

        .password-tool-wrapper * { box-sizing: border-box; }

        .password-tool-wrapper h2 {
            color: #007bff;
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.5em;
        }

        .password-tool-wrapper .password-input {
            width: 100%;
            padding: 15px;
            font-size: 1.1em;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: #f8f9fa;
            color: #555;
            user-select: all;
        }

        .password-tool-wrapper .button-group {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }

        .password-tool-wrapper button {
            flex: 1;
            padding: 12px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            transition: transform 0.1s, filter 0.2s;
        }

        .password-tool-wrapper button:active { transform: translateY(2px); }
        .password-tool-wrapper button:hover { filter: brightness(0.9); }

        .password-tool-wrapper .btn-weak { background-color: #ffc107; }
        .password-tool-wrapper .btn-strong { background-color: #28a745; }

        .password-tool-wrapper .copy-message {
            margin-top: 15px;
            font-size: 0.85em;
            color: #666;
            height: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .password-tool-wrapper .copy-message.show { opacity: 1; }

        /* 响应式调整 */
        @media (min-width: 400px) {
            .password-tool-wrapper .button-group { flex-direction: row; }
        }
    </style>
</head>
<body>

<div class="password-tool-wrapper">
    <h2>密码生成器</h2>
    <input type="text" id="result" class="password-input" placeholder="点击按钮生成" readonly>
    <div class="button-group">
        <button onclick="generatePwd(8)" class="btn-weak">8位中等</button>
        <button onclick="generatePwd(16)" class="btn-strong">16位复杂</button>
    </div>
    <p id="copyMessage" class="copy-message">已自动复制到剪贴板！</p>
</div>

<script>
    function showCopyMessage() {
        const msg = document.getElementById("copyMessage");
        msg.classList.add("show");
        setTimeout(() => msg.classList.remove("show"), 2000);
    }

    // 合并生成逻辑，增加可维护性
    function generatePwd(length) {
        const chars = length === 8 
            ? "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ" 
            : "0123456789abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$%^&*()_+[]{}<>?";
        
        let pwd = "";
        for (let i = 0; i < length; i++) {
            pwd += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        
        const input = document.getElementById("result");
        input.value = pwd;
        
        navigator.clipboard.writeText(pwd).then(showCopyMessage);
    }
</script>

</body>
</html>
